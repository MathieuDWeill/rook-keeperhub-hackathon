services:
  api:
    build: .
    command: uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports: ["8000:8000"]
  demo:
    build: .
    command: streamlit run apps/demo/app.py --server.address=0.0.0.0 --server.port=8501
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports: ["8501:8501"]
    depends_on: [api]
